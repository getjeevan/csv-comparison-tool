services:
  netclaw:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: netclaw
    restart: unless-stopped
    ports:
      - "3000:3000"
    env_file:
      - .env
    volumes:
      # Persist OpenClaw config, tokens, and workspace across container restarts
      - netclaw-config:/root/.openclaw
      - netclaw-auth:/root/.config/openclaw
      # Optional: mount a local data directory
      - ./data:/netclaw/data
    networks:
      - netclaw-net
    logging:
      driver: "json-file"
      options:
        max-size: "20m"
        max-file: "5"
    healthcheck:
      test: ["CMD", "curl", "-f", "--silent", "--max-time", "5", "http://localhost:3000/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 60s

volumes:
  netclaw-config:
    name: netclaw-config
  netclaw-auth:
    name: netclaw-auth

networks:
  netclaw-net:
    driver: bridge
    name: netclaw-network
