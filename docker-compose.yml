services:
  csv-comparison-tool:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: csv-comparison-tool
    ports:
      - "8501:8501"
    environment:
      - PYTHONPATH=/app
      - PYTHONUNBUFFERED=1
      - PYTHONDONTWRITEBYTECODE=1
      - STREAMLIT_SERVER_PORT=8501
      - STREAMLIT_SERVER_ADDRESS=0.0.0.0
      - STREAMLIT_SERVER_HEADLESS=true
      - STREAMLIT_SERVER_ENABLE_CORS=false
      - STREAMLIT_SERVER_ENABLE_XSRF_PROTECTION=false
      # xAI API key — required for Grok AI Insights and Grok Build CLI
      - XAI_API_KEY=${XAI_API_KEY:-}
    volumes:
      # Optional: Mount a volume for persistent data if needed
      - ./data:/app/data
      # Optional: Mount logs directory
      - ./logs:/app/logs
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-f", "--silent", "--max-time", "10", "http://localhost:8501/_stcore/health"]
      interval: 30s
      timeout: 15s
      retries: 3
      start_period: 60s
    networks:
      - csv-tool-network
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"

  # Grok Build CLI service — run agentic coding tasks against the repo
  # Usage: docker compose run --rm grok-build -p "your prompt here"
  grok-build:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: grok-build
    working_dir: /app
    entrypoint: ["grok-build"]
    command: ["--help"]
    environment:
      - XAI_API_KEY=${XAI_API_KEY:-}
    volumes:
      - .:/app
    networks:
      - csv-tool-network
    profiles:
      - dev

networks:
  csv-tool-network:
    driver: bridge
    name: csv-comparison-network